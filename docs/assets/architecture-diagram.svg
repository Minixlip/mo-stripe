<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#F3F1EB"/>

  <text x="88" y="110" fill="#0F0F0F" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">mo-stripe architecture</text>
  <text x="88" y="160" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="28">A fintech-style learning project focused on safe money movement and clear backend boundaries.</text>

  <rect x="88" y="228" width="320" height="210" fill="#F7F5EF" stroke="#161616" stroke-width="3"/>
  <rect x="448" y="228" width="320" height="210" fill="#F7F5EF" stroke="#161616" stroke-width="3"/>
  <rect x="808" y="228" width="320" height="210" fill="#F7F5EF" stroke="#161616" stroke-width="3"/>
  <rect x="1168" y="228" width="320" height="210" fill="#F7F5EF" stroke="#161616" stroke-width="3"/>

  <text x="116" y="274" fill="#7A7771" font-family="Courier New, monospace" font-size="16">CLIENT</text>
  <text x="476" y="274" fill="#7A7771" font-family="Courier New, monospace" font-size="16">HTTP BOUNDARY</text>
  <text x="836" y="274" fill="#7A7771" font-family="Courier New, monospace" font-size="16">DOMAIN</text>
  <text x="1196" y="274" fill="#7A7771" font-family="Courier New, monospace" font-size="16">DATA</text>

  <text x="116" y="332" fill="#0F0F0F" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Next.js app</text>
  <text x="476" y="332" fill="#0F0F0F" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Express API</text>
  <text x="836" y="332" fill="#0F0F0F" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Service layer</text>
  <text x="1196" y="332" fill="#0F0F0F" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Postgres</text>

  <text x="116" y="372" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <tspan x="116" dy="0">App Router frontend</tspan>
    <tspan x="116" dy="30">REST requests with</tspan>
    <tspan x="116" dy="30">credentials included</tspan>
  </text>

  <text x="476" y="372" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <tspan x="476" dy="0">Validation, auth,</tspan>
    <tspan x="476" dy="30">rate limits, health checks,</tspan>
    <tspan x="476" dy="30">request IDs, structured logs</tspan>
  </text>

  <text x="836" y="372" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <tspan x="836" dy="0">Idempotent money writes,</tspan>
    <tspan x="836" dy="30">overdraft checks,</tspan>
    <tspan x="836" dy="30">posting-derived balances</tspan>
  </text>

  <text x="1196" y="372" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <tspan x="1196" dy="0">Prisma ORM</tspan>
    <tspan x="1196" dy="30">Supabase-hosted</tspan>
    <tspan x="1196" dy="30">PostgreSQL</tspan>
  </text>

  <path d="M408 332H448" stroke="#161616" stroke-width="4"/>
  <path d="M768 332H808" stroke="#161616" stroke-width="4"/>
  <path d="M1128 332H1168" stroke="#161616" stroke-width="4"/>
  <polygon points="440,322 448,332 440,342" fill="#161616"/>
  <polygon points="800,322 808,332 800,342" fill="#161616"/>
  <polygon points="1160,322 1168,332 1160,342" fill="#161616"/>

  <rect x="88" y="500" width="320" height="150" fill="#E7E4DC" stroke="#161616" stroke-width="2"/>
  <rect x="448" y="500" width="320" height="150" fill="#E7E4DC" stroke="#161616" stroke-width="2"/>
  <rect x="808" y="500" width="320" height="150" fill="#E7E4DC" stroke="#161616" stroke-width="2"/>
  <rect x="1168" y="500" width="320" height="150" fill="#E7E4DC" stroke="#161616" stroke-width="2"/>

  <text x="116" y="540" fill="#7A7771" font-family="Courier New, monospace" font-size="14">AUTH MODEL</text>
  <text x="476" y="540" fill="#7A7771" font-family="Courier New, monospace" font-size="14">WRITE PATH</text>
  <text x="836" y="540" fill="#7A7771" font-family="Courier New, monospace" font-size="14">LEDGER MODEL</text>
  <text x="1196" y="540" fill="#7A7771" font-family="Courier New, monospace" font-size="14">OPERATIONS</text>

  <text x="116" y="584" fill="#161616" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">JWT in httpOnly cookie</text>
  <text x="116" y="616" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="116" dy="0">Backend resolves identity</tspan>
    <tspan x="116" dy="24">from middleware, not the client.</tspan>
  </text>

  <text x="476" y="584" fill="#161616" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Idempotency key required</text>
  <text x="476" y="616" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="476" dy="0">Replay-safe deposits,</tspan>
    <tspan x="476" dy="24">withdrawals, and transfers.</tspan>
  </text>

  <text x="836" y="584" fill="#161616" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Append-only postings</text>
  <text x="836" y="616" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="836" dy="0">Balances and statements derive</tspan>
    <tspan x="836" dy="24">from debit and credit rows.</tspan>
  </text>

  <text x="1196" y="584" fill="#161616" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">CI + tests + logs</text>
  <text x="1196" y="616" fill="#66635E" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="1196" dy="0">Request IDs, health checks,</tspan>
    <tspan x="1196" dy="24">and GitHub Actions validation.</tspan>
  </text>

  <rect x="88" y="734" width="1400" height="148" fill="#C8F000" stroke="#161616" stroke-width="3"/>
  <text x="116" y="776" fill="#161616" font-family="Courier New, monospace" font-size="18">CORE REQUEST FLOW</text>
  <text x="116" y="822" fill="#161616" font-family="Arial, Helvetica, sans-serif" font-size="26">
    <tspan x="116" dy="0">Browser -&gt; cookie-backed REST request -&gt; Express middleware -&gt; service invariants</tspan>
    <tspan x="116" dy="38">-&gt; Prisma transaction -&gt; ledger postings -&gt; derived reads</tspan>
  </text>
</svg>
